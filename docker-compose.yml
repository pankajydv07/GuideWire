services:
  # ─── PostgreSQL + TimescaleDB ───────────────────────
  postgres:
    image: timescale/timescaledb:latest-pg15
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ankush}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis ──────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Neo4j (Knowledge Graph v0) ─────────────────────
  neo4j:
    image: neo4j:5-community
    environment:
      NEO4J_AUTH: neo4j/zylo12345
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10

  # ─── Database Setup (Tables + Seeds) ────────────
  setup:
    build: ./backend
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-ankush}@postgres:5432/${POSTGRES_DB:-postgres}
      DATABASE_URL_SYNC: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-ankush}@postgres:5432/${POSTGRES_DB:-postgres}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: python -m scripts.setup

  # ─── Backend API ────────────────────────────────────
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-ankush}@postgres:5432/${POSTGRES_DB:-postgres}
      DATABASE_URL_SYNC: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-ankush}@postgres:5432/${POSTGRES_DB:-postgres}
      REDIS_URL: redis://redis:6379/0
      ML_SERVICE_URL: http://ml:8001
      UPLOAD_DIR: /app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      setup:
        condition: service_completed_successfully
    volumes:
      - ./backend:/app
      - upload_data:/app/uploads
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  # ─── Trigger Scheduler ─────────────────────────────
  scheduler:
    build: ./backend
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-ankush}@postgres:5432/${POSTGRES_DB:-postgres}
      DATABASE_URL_SYNC: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-ankush}@postgres:5432/${POSTGRES_DB:-postgres}
      REDIS_URL: redis://redis:6379/0
      ML_SERVICE_URL: http://ml:8001
    depends_on:
      postgres:
        condition: service_healthy
      setup:
        condition: service_completed_successfully
    volumes:
      - ./backend:/app
    command: python -m trigger_service.scheduler

  # ─── ML Service ────────────────────────────────────
  ml:
    build:
      context: ./backend
      dockerfile: ./ml/Dockerfile
    ports:
      - "8001:8001"
    volumes:
      - ./backend:/app
    command: uvicorn ml.serve:app --host 0.0.0.0 --port 8001 --reload

volumes:
  postgres_data:
  redis_data:
  neo4j_data:
  upload_data:
