version: '3.8'

services:
  # ─── PostgreSQL + TimescaleDB ───────────────────────
  postgres:
    image: timescale/timescaledb:latest-pg15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ankush
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis ──────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Backend API ────────────────────────────────────
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:ankush@postgres:5432/postgres
      - DATABASE_URL_SYNC=postgresql://postgres:ankush@postgres:5432/postgres
      - REDIS_URL=redis://redis:6379/0
      - JWT_SECRET_KEY=ridershield-dev-secret
      - OPENWEATHERMAP_API_KEY=${OPENWEATHERMAP_API_KEY:-}
      - DEBUG=true
      - LOG_LEVEL=INFO
      - UPLOAD_DIR=/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - upload_data:/app/uploads
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  # ─── Trigger Scheduler ─────────────────────────────
  scheduler:
    build: ./backend
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:ankush@postgres:5432/postgres
      - DATABASE_URL_SYNC=postgresql://postgres:ankush@postgres:5432/postgres
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: python -m trigger_service.scheduler

volumes:
  postgres_data:
  redis_data:
  upload_data:
