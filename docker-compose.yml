services:
  # ─── PostgreSQL + TimescaleDB ───────────────────────
  postgres:
    image: timescale/timescaledb:latest-pg15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ankush
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis ──────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Database Setup (Tables + Seeds) ────────────
  setup:
    build: ./backend
    env_file:
      - ./backend/.env
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: python -m scripts.setup

  # ─── Backend API ────────────────────────────────────
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      setup:
        condition: service_completed_successfully
    volumes:
      - ./backend:/app
      - upload_data:/app/uploads
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  # ─── Trigger Scheduler ─────────────────────────────
  scheduler:
    build: ./backend
    env_file:
      - ./backend/.env
    depends_on:
      postgres:
        condition: service_healthy
      setup:
        condition: service_completed_successfully
    volumes:
      - ./backend:/app
    command: python -m trigger_service.scheduler

  # ─── ML Service ────────────────────────────────────
  ml:
    build:
      context: ./backend
      dockerfile: ./ml/Dockerfile
    ports:
      - "8001:8001"
    volumes:
      - ./backend:/app
    command: uvicorn ml.serve:app --host 0.0.0.0 --port 8001 --reload

volumes:
  postgres_data:
  redis_data:
  upload_data:
